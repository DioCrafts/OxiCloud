---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "oxicloud.fullname" . }}
  labels:
    {{- include "oxicloud.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "oxicloud.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "oxicloud.fullname" . }}-headless
  labels:
    {{- include "oxicloud.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "oxicloud.selectorLabels" . | nindent 4 }}